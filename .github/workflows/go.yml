# 工作流名称
name: Build netTopology (Linux amd64)

on:
  push:
    branches: [ main ]
    paths: [ 'netTopology/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - name: Build
        working-directory: ./netTopology
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o netTopology_linux_amd64 .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: netTopology_linux_amd64
          path: ./netTopology/netTopology_linux_amd64
